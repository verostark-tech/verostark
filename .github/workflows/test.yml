name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, production]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Encore
        run: curl -L https://encore.dev/install.sh | bash

      - name: Add Encore to PATH
        run: echo "$HOME/.encore/bin" >> $GITHUB_PATH

      - name: Run tests
        run: encore test ./...
